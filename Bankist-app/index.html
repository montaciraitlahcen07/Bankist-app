<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bankist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="output.css" />
  </head>
  <body class="h-full">
    <div class="w-screen h-screen bg-[#F3F3F3] overflow-auto">
      <header class="flex justify-between px-10 mt-5.5 mx-auto items-center">
        <h2
          class="font-[poppins] font-medium text-[#444444] text-[19px] leading-normal greeting"
        >
          Log in to get started
        </h2>
        <img class="h-13" src="/logo.png" alt="" />
        <form class="flex justify-center items-center font-[poppins]" action="">
          <input
            class="transition-[2s] delay-100 mr-2 placeholder-[#BBBBBB] border-2 border-[#F5F5F5] focus:outline-none focus:border-[#DFDFDF] text-center w-30 h-10 text-[16px] bg-[#FFFFFF] rounded-3xl username"
            placeholder="user"
            type="text"
          />
          <input
            class="transition-[2s] delay-100 mr-2 placeholder-[#BBBBBB] text-center border-2 border-[#F5F5F5] focus:outline-none focus:border-[#DFDFDF] w-30 h-10 text-[16px] bg-[#FFFFFF] rounded-3xl pin"
            maxlength="4"
            placeholder="PIN"
            type="text"
          />
          <button
            class="text-[#444] cursor-pointer font-semibold text-[1.4rem] login-button"
          >
            →
          </button>
        </form>
      </header>
      <main
        class="mx-auto mt-8 w-[59%] font-[poppins] flex flex-col text-[rgb(68,68,68)] h-[73vh] opacity-0 main"
      >
        <header class="flex justify-between">
          <div class="">
            <p class="text-[22px] font-medium">Current balance</p>
            <p class="text-[rgb(136,136,136)] text-[14px]">
              As of <span class="clock"></span>
            </p>
          </div>
          <p class="text-[43px] total_balance"></p>
        </header>
        <div class="grid gap-4 grid-cols-[56%_43%] flex-1 min-h-0 mt-5">
          <div
            class="bg-white overflow-x-scroll overflow-y-auto rounded-lg movements"
          ></div>
          <div class="grid grid-rows-3 gap-4">
            <div class="bg-linear-to-br from-[#FFCA03] to-[#FFB103] rounded-lg">
              <p
                class="font-semibold text-[17px] text-[rgb(51, 51, 51)] pt-8 pl-9"
              >
                Transfer money
              </p>
              <form class="flex pt-3 pl-9 gap-2">
                <div class="">
                  <input
                    class="bg-[#FFD968] rounded-[9px] w-35 h-7.5 outline-0 focus:bg-[#FFE59A] text-center transfer_to"
                    type="text"
                  />
                  <p class="text-[13px] pt-0.5 text-center text-[#333333]">
                    Transfer to
                  </p>
                </div>
                <div>
                  <input
                    class="bg-[#FFD968] rounded-[9px] w-35 h-7.5 outline-0 focus:bg-[#FFE59A] text-center transfer_amount"
                    type="number"
                  />
                  <p class="text-[13px] pt-0.5 text-center text-[#333333]">
                    Amount
                  </p>
                </div>
                <button
                  class="bg-[#FFFFFF] rounded-lg w-13 text-[18px] font-extrabold h-7.5 cursor-pointer transfer_button"
                >
                  →
                </button>
              </form>
            </div>
            <div class="bg-linear-to-br from-[#97DF5E] to-[#42B782] rounded-lg">
              <p
                class="font-semibold text-[17px] text-[rgb(51, 51, 51)] pt-8 pl-9"
              >
                Request loan
              </p>
              <form class="flex pt-3 pl-9 gap-2">
                <div>
                  <input
                    class="bg-[#ABE2A7] rounded-[9px] w-35 h-7.5 outline-0 focus:bg-[#C6EBC5] text-center loan_amount"
                    type="number"
                  />
                  <p class="text-[13px] text-center pt-0.5 text-[#333333]">
                    Amount
                  </p>
                </div>
                <button
                  class="bg-[#FFFFFF] rounded-lg w-13 text-[18px] font-extrabold h-7.5 cursor-pointer loan_button"
                >
                  →
                </button>
              </form>
            </div>
            <div class="bg-linear-to-br from-[#FE565F] to-[#EB355B] rounded-lg">
              <p
                class="font-semibold text-[17px] text-[rgb(51, 51, 51)] pt-8 pl-9"
              >
                Close account
              </p>
              <form class="flex pt-3 pl-9 gap-2">
                <div>
                  <input
                    class="bg-[#F88F9D] rounded-[9px] w-35 h-7.5 outline-0 focus:bg-[#FAB4BE] text-center close_user"
                    type="text"
                  />
                  <p class="text-[13px] text-center pt-0.5 text-[#333333]">
                    Confirm user
                  </p>
                </div>
                <div>
                  <input
                    class="bg-[#F88F9D] rounded-[9px] w-35 h-7.5 outline-0 focus:bg-[#FAB4BE] text-center close_pin"
                    maxlength="4"
                    type="password"
                  />
                  <p class="text-[13px] text-center pt-0.5 text-[#333333]">
                    Confirm PIN
                  </p>
                </div>
                <button
                  class="bg-[#FFFFFF] rounded-lg w-13 text-[18px] font-extrabold h-7.5 cursor-pointer close_button"
                >
                  →
                </button>
              </form>
            </div>
          </div>
        </div>
      </main>
      <div
        class="h-[10vh] flex w-[59%] mt-1.5 mx-auto justify-between items-center font-[poppins] opacity-0 summary"
      >
        <div class="flex gap-7 items-baseline pl-1">
          <p class="text-[12px] text-[rgb(68,68,68)] font-medium">
            IN
            <span class="text-[22px] text-[#66C873] in_balance pl-1.5"></span>
          </p>
          <p class="text-[12px] text-[rgb(68,68,68)] font-medium">
            OUT
            <span class="text-[22px] text-[#F5465D] pl-1.5 out_balance"></span>
          </p>
          <p class="text-[12px] text-[rgb(68,68,68)] font-medium">
            INTEREST
            <span class="text-[22px] text-[#66C873] pl-1.5 interest"></span>
          </p>
          <p
            class="text-[13.5px] text-[rgb(68,68,68)] font-[arial] font-medium hover:text-[#777777] hover:cursor-pointer sort"
          >
            ↓ SORT
          </p>
        </div>
        <p class="text-[13px] text-[rgb(68,68,68)] -mr-1">
          You will be logged out in
          <span class="font-semibold text-[13px] text-[rgb(68,68,68)] Log-out"
            ></span
          >
        </p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
